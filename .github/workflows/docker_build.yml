name: Cross-Compile Aria2 via Dockerfile.mingw & Publish Release

on: [push,pull_request,workflow_dispatch]

jobs:
  build-via-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Modify connection limit
      run: |
        sed -i 's/"16"/"128"/g' src/OptionHandlerFactory.cc

    - name: Build Docker Image
      run: |
        docker build -t aria2-mingw-image -f Dockerfile.mingw .

    - name: Extract Binary from Docker Container
      run: |
        docker run --rm -v "$PWD/output":/out aria2-mingw-image cp /aria2/src/aria2c.exe /out

    # 5. 自动发布到 GitHub Release 页面
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ./output/aria2c.exe
        name: Aria2 Docker-Built Windows Release ${{ github.ref_name }}
        body: |
          ## 🚀 Docker 自动化编译完成
          基于官方 `Dockerfile.mingw` 容器化交叉构建的 Windows 64位版本。
          
          ### 🛠️ 定制特性
          * **128 线程**：已解除官方最高 16 线程限制。
          * **官方标准依赖**：完全遵循官方 `Dockerfile.mingw` 预设的依赖链和最佳实践构建，稳定性极佳。
          * **纯绿色无依赖**：全静态打包，解压即用。
        draft: false
        prerelease: false
