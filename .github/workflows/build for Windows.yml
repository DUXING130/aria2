name: Cross-Compile Aria2 for Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库源码
    - name: Checkout source code
      uses: actions/checkout@v6

    # 2. 安装 Linux 宿主机上的交叉编译依赖
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 g++-mingw-w64 gcc-mingw-w64 \
                               binutils-mingw-w64 autoconf automake \
                               libtool pkg-config git make gzip bzip2 \
                               autopoint
                               
    - name: Setup Vcpkg & Build Dependencies
      run: |
        # 克隆 vcpkg
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.sh
        
        # 核心：使用 vcpkg 一键编译出 windows x64 架构下所需的所有静态库
        # 这里的 triplet 选用 x64-windows-static-md 或自定义 mingw，
        # 为了兼容性，我们直接让 vcpkg 用 mingw 编译，或者直接利用 vcpkg 导出的头文件。
        # 针对 MinGW 交叉编译，最直观的方式是让 vcpkg 编译出静态二进制文件：
        ./vcpkg install zlib c-ares libssh2 sqlite3 expat --triplet=x64-windows-static
        
        # 将编译好的头文件和库路径导出或软链接到 MinGW 寻找的目录中
        sudo cp -r packages/*_x64-windows-static/include/* /usr/x86_64-w64-mingw32/include/
        sudo cp packages/*_x64-windows-static/lib/*.lib /usr/x86_64-w64-mingw32/lib/
        
        # 兼容性修复：MinGW 链接器识别 .a 格式，Windows 静态库通常是 .lib，直接改名拷贝即可
        cd /usr/x86_64-w64-mingw32/lib/
        for f in *.lib; do sudo cp "$f" "lib${f%.lib}.a"; done
        cd -
        cd ..
        
    # 3. 生成配置脚本并运行 ./configure
    # 使用 --with-wintls 代替 OpenSSL，免去编译复杂第三方库的麻烦，且能极大减小体积
    - name: Configure for Windows x64
      run: |
        autoreconf -i
        ./configure \
          --host=x86_64-w64-mingw32 \
          --prefix=$PWD/build-win64 \
          --enable-static-binary \
          ARIA2_STATIC=yes \
          --with-wintls \
          --without-libxml2 \
          --with-libexpat \

    # 4. 编译
    - name: Compile Aria2
      run: |
        make -j$(nproc)
        make install

    # 5. 使用 strip 移除调试符号，进行极限瘦身
    - name: Optimize and Strip Binary
      run: |
        echo "Original size:"
        ls -lh build-win64/bin/aria2c.exe
        
        x86_64-w64-mingw32-strip build-win64/bin/aria2c.exe
        
        echo "Stripped size:"
        ls -lh build-win64/bin/aria2c.exe

    # 6. 将编译出的 exe 文件上传到 GitHub Actions Artifacts 中
    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: aria2c-win64-custom
        path: build-win64/bin/aria2c.exe
        retention-days: 7 # 编译出的文件在 GitHub 保存 7 天
