name: Cross-Compile Aria2 for Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库源码
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. 安装 Linux 宿主机上的交叉编译依赖
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 g++-mingw-w64 gcc-mingw-w64 \
                               binutils-mingw-w64 autoconf automake \
                               libtool pkg-config git make gzip bzip2

    # 3. 修改源码以突破 16 线程限制（解除官方封印）
    - name: Modify connection limit
      run: |
        echo "Modifying Max Connection Limit to 128..."
        sed -i 's/"16"/"128"/g' src/OptionHandlerFactory.cc

    # 4. 生成配置脚本并运行 ./configure
    # 使用 --with-wintls 代替 OpenSSL，免去编译复杂第三方库的麻烦，且能极大减小体积
    - name: Configure for Windows x64
      run: |
        autoreconf -i
        ./configure \
          --host=x86_64-w64-mingw32 \
          --prefix=$PWD/build-win64 \
          --enable-static-binary \
          ARIA2_STATIC=yes \
          --with-wintls \
          --without-libxml2 \
          --with-libexpat

    # 5. 编译
    - name: Compile Aria2
      run: |
        make -j$(nproc)
        make install

    # 6. 使用 strip 移除调试符号，进行极限瘦身
    - name: Optimize and Strip Binary
      run: |
        echo "Original size:"
        ls -lh build-win64/bin/aria2c.exe
        
        x86_64-w64-mingw32-strip build-win64/bin/aria2c.exe
        
        echo "Stripped size:"
        ls -lh build-win64/bin/aria2c.exe

    # 7. 将编译出的 exe 文件上传到 GitHub Actions Artifacts 中
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-win64-custom
        path: build-win64/bin/aria2c.exe
        retention-days: 7 # 编译出的文件在 GitHub 保存 7 天
