name: Cross-Compile Aria2 for Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库源码
    - name: Checkout source code
      uses: actions/checkout@v6

    # 2. 安装 Linux 宿主机上的交叉编译依赖
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 g++-mingw-w64 gcc-mingw-w64 \
                               binutils-mingw-w64 autoconf automake \
                               libtool pkg-config git make gzip bzip2 \
                               autopoint libsqlite3-dev
    - name: Build SQLite3 for Windows x64
      run: |
        # 下载 2026 年（或最新稳定版）的 SQLite 源码（这里以通用无版本号 amalgamation 为例，或指定版本）
        wget https://www.sqlite.org/2024/sqlite-amalgamation-3460000.zip
        unzip sqlite-amalgamation-3460000.zip
        cd sqlite-amalgamation-3460000
        
        # 使用 Mingw 编译器手动将其编译为静态库 .a 文件
        x86_64-w64-mingw32-gcc -c sqlite3.c -o sqlite3.o -O2
        x86_64-w64-mingw32-ar rcs libsqlite3.a sqlite3.o
        
        # 将头文件和静态库复制到 Mingw 的系统搜索目录下
        sudo cp sqlite3.h /usr/x86_64-w64-mingw32/include/
        sudo cp libsqlite3.a /usr/x86_64-w64-mingw32/lib/
        cd ..
        
    # 3. 生成配置脚本并运行 ./configure
    # 使用 --with-wintls 代替 OpenSSL，免去编译复杂第三方库的麻烦，且能极大减小体积
    - name: Configure for Windows x64
      run: |
        autoreconf -i
        ./configure \
          --host=x86_64-w64-mingw32 \
          --prefix=$PWD/build-win64 \
          --enable-static-binary \
          ARIA2_STATIC=yes \
          --with-wintls \
          --without-libxml2 \
          --with-libexpat

    # 4. 编译
    - name: Compile Aria2
      run: |
        make -j$(nproc)
        make install

    # 5. 使用 strip 移除调试符号，进行极限瘦身
    - name: Optimize and Strip Binary
      run: |
        echo "Original size:"
        ls -lh build-win64/bin/aria2c.exe
        
        x86_64-w64-mingw32-strip build-win64/bin/aria2c.exe
        
        echo "Stripped size:"
        ls -lh build-win64/bin/aria2c.exe

    # 6. 将编译出的 exe 文件上传到 GitHub Actions Artifacts 中
    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: aria2c-win64-custom
        path: build-win64/bin/aria2c.exe
        retention-days: 7 # 编译出的文件在 GitHub 保存 7 天
